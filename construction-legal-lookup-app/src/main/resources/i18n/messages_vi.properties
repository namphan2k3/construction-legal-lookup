# General
uncategorized_error = Lỗi chưa phân loại
invalid_input = Dữ liệu đầu vào không hợp lệ

# User & Auth
user.not_existed = Người dùng không tồn tại
user.existed = Người dùng đã tồn tại
unauthenticated = Chưa xác thực
forbidden = Không có quyền truy cập
invalid_token = Token không hợp lệ
user.register_success = Đăng ký tài khoản thành công
user.login_success = Đăng nhập thành công
user.refresh_success = Làm mới token thành công
user.logout_success = Đăng xuất thành công
user.profile_success = Lấy hồ sơ người dùng thành công
user.update_success = Cập nhật thông tin thành công
user.password_changed = Đổi mật khẩu thành công
role_not_existed = Vai trò không tồn tại
email_already_exists = Email đã được sử dụng
account_disabled = Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.

# Document & Search
document.not_existed = Văn bản pháp luật không tồn tại
document.create_success = Tạo văn bản thành công
document.update_success = Cập nhật văn bản thành công
document.delete_success = Xóa văn bản thành công
document.restore_success = Khôi phục văn bản thành công
document.list_success = Lấy danh sách văn bản thành công
document.detail_success = Lấy thông tin chi tiết văn bản thành công

# Bookmark
bookmark.create_success = Đã thêm vào danh sách yêu thích
bookmark.delete_success = Đã xóa khỏi danh sách yêu thích
bookmark.list_success = Lấy danh sách yêu thích thành công
bookmark.already_exists = Văn bản này đã được yêu thích trước đó
bookmark.not_found = Không tìm thấy bookmark

# Search History & View History
search_history.list_success = Lấy lịch sử tìm kiếm thành công
search_history.clear_success = Xóa lịch sử tìm kiếm thành công
view_history.list_success = Lấy lịch sử xem văn bản thành công
view_history.clear_success = Xóa lịch sử xem thành công
view_history.add_success = Ghi nhận lịch sử xem thành công

# AI & Audit
audit_log.list_success = Lấy nhật ký audit thành công
crawl_log.list_success = Lấy nhật ký crawl thành công
crawl_log.trigger_success = Đã kích hoạt tiến trình crawler
ai.ask_success = AI phản hồi thành công
ai.rate_limit_exceeded = Bạn đã vượt quá giới hạn lượt dùng AI trong ngày hôm nay.
