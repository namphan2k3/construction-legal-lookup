spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:${MYSQL_PUBLIC_URL}?useSSL=true&requireSSL=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD}}

  jpa:
    show-sql: false

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    ssl:
      enabled: ${REDIS_SSL_ENABLED:true}

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:900}          # 15 phút
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:604800}  # 7 ngày

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:}
  api_key: ${CLOUDINARY_API_KEY:}
  api_secret: ${CLOUDINARY_API_SECRET:}
